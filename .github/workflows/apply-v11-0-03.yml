name: Apply V11.0.03

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - V11_0_03_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply V11.0.03
        run: python scripts/apply_v11_0_03.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js
      - name: Validate touch fix
        run: |
          grep -Fq 'VENANC Tools V11.0.03' index.html
          grep -Fq 'V11.0.03 — toque nativo' index.html
          grep -Fq "querySelectorAll('.operatorField').forEach" index.html
          ! grep -Fq "input.addEventListener('pointerdown'" index.html
      - name: Commit V11.0.03
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: corrigir toque dos campos no iPhone V11.0.03'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
