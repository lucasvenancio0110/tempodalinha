name: PULSE CNC Beta Core

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/core/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/pulse-beta-core.yml'

permissions:
  contents: read

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Testar motor de cálculo
        run: npm test
