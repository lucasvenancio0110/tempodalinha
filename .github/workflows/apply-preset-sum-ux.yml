name: Apply preset and sum UX

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar atualização
        run: python tools/apply_preset_sum_ux.py
      - name: Validar interface e JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          assert "['now','next','reached'].includes(calc.status)" in text
          assert 'data-v111-tray-expression type="text" inputmode="text"' in text
          assert 'data-v14-preset-editor' in text
          assert '.presetEditorSlotV14:empty { display:none; }' in text
          assert 'grid-column: 1 / -1' in text
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          Path('/tmp/app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('Preset e soma rápida validados')
          PY
          node --check /tmp/app.js
      - name: Commitar resultado
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Melhora Preset e soma rápida"
          git push
