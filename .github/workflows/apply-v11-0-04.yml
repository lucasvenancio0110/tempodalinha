name: Apply V11.0.04

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - V11_0_04_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply structural focus fix
        run: python scripts/apply_v11_0_04.py
      - name: Validate Python patch
        run: python -m py_compile scripts/apply_v11_0_04.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('JavaScript não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js
      - name: Validate root cause removal
        run: |
          grep -Fq 'VENANC Tools V11.0.04' index.html
          grep -Fq 'setInterval(refreshLiveRemaining, 250);' index.html
          grep -Fq 'machineScreenMode === "edit") return;' index.html
          grep -Fq 'row.dataset.signature !== signature' index.html
          ! grep -Fq "querySelectorAll('.operatorField').forEach" index.html
          ! grep -Fq "timeInput\"]')?.focus" index.html
      - name: Commit V11.0.04
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: remover disputa de foco e reduzir atualizações V11.0.04'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
