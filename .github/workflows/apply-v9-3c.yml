name: Apply V9.3 direct

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/v9-3b-header-clear'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v9-3b-header-clear
          fetch-depth: 0

      - name: Apply and test
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          raw=p.read_bytes()
          nl='\r\n' if b'\r\n' in raw else '\n'
          t=raw.decode('utf-8').replace('\r\n','\n').replace('\r','\n')
          def one(a,b,n):
              global t
              c=t.count(a)
              if c!=1: raise SystemExit(f'{n}: {c}')
              t=t.replace(a,b,1)
          one('<title>Tempo da Linha | VENANC Tools V9.2</title>','<title>Tempo da Linha | VENANC Tools V9.3</title>','version')
          one('    .appHeader {\n      position: sticky;\n      top: 0;\n      z-index: 50;','    .appHeader {\n      position: relative;\n      z-index: 1;','header')
          one('    .btnDanger { color: var(--bad); background: var(--bad-bg); border-color: #ffd3d6; }','''    .btnDanger { color: var(--bad); background: var(--bad-bg); border-color: #ffd3d6; }
    .machineDangerZone { margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:14px; border:1px solid #f0d4d7; border-radius:15px; padding:13px 14px; background:linear-gradient(145deg,#fffafa,#fff3f4); }
    .machineDangerZone strong { display:block; color:#6e2229; font-size:14px; }
    .machineDangerZone span { display:block; margin-top:4px; color:#93656a; font-size:11px; font-weight:750; line-height:1.35; }
    .clearMachineBtn { flex:0 0 auto; min-height:44px; }
    @media (max-width:620px) { .machineDangerZone { align-items:stretch; flex-direction:column; } .clearMachineBtn { width:100%; } }''','css')
          one('        <div class="section requestBox" data-role="requestBox">','''        <div class="machineDangerZone">
          <div><strong>Reiniciar esta máquina</strong><span>Apaga apenas os dados preenchidos e mantém a TNL na célula.</span></div>
          <button class="btn btnDanger clearMachineBtn" data-action="clearMachine" type="button">🗑 Limpar dados</button>
        </div>

        <div class="section requestBox" data-role="requestBox">''','html')
          one('    function bindActions(root, machine) {\n      root.querySelector(\'[data-action="toggle"]\').addEventListener("click", () => {','''    function clearMachineData(machine) {
      const preservedId = machine.id;
      const preservedMachine = machine.machine;
      const clean = DEFAULT_MACHINE(Date.now());
      Object.assign(machine, clean, { id: preservedId, machine: preservedMachine, collapsed: true });
    }

    function bindActions(root, machine) {
      root.querySelector('[data-action="toggle"]').addEventListener("click", () => {''','function')
          one('      const removeButton = root.querySelector(\'[data-action="remove"]\');\n      if (removeButton) removeButton.style.display = "none";\n      root.querySelector(\'[data-action="minusBar"]\').addEventListener("click", () => {','''      const removeButton = root.querySelector('[data-action="remove"]');
      if (removeButton) removeButton.style.display = "none";
      const clearButton = root.querySelector('[data-action="clearMachine"]');
      if (clearButton) clearButton.addEventListener("click", () => {
        const label = `TNL ${formatTnl(machine.machine)}`;
        if (!window.confirm(`Limpar os dados da ${label}?\n\nTodos os dados preenchidos serão apagados. A máquina continuará na célula.`)) return;
        clearMachineData(machine);
        saveState();
        render();
      });
      root.querySelector('[data-action="minusBar"]').addEventListener("click", () => {''','action')
          p.write_bytes(t.replace('\n',nl).encode('utf-8'))
          scripts=re.findall(r'<script>(.*?)</script>',t,flags=re.S)
          Path('/tmp/app.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/app.js
          ! grep -Fq 'position: sticky;' index.html
          grep -Fq 'data-action="clearMachine"' index.html
          grep -Fq 'function clearMachineData(machine)' index.html

      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'feat: remover cabeçalho flutuante e permitir limpar máquina'
          git push origin HEAD:feature/v9-3b-header-clear
