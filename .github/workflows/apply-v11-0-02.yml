name: Apply V11.0.02

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - V11_0_02_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply V11.0.02
        run: python scripts/apply_v11_0_02.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('Script principal não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Validate focus structure
        run: |
          grep -Fq 'VENANC Tools V11.0.02' index.html
          grep -Fq 'Não bloqueia dblclick/touchend' index.html
          grep -Fq 'enterkeyhint="next"' index.html
          grep -Fq "event.key !== 'Enter'" index.html

      - name: Commit V11.0.02
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'V11.0.02 already applied.'
            exit 0
          fi
          git commit -m 'fix: corrigir foco e toques no iPhone V11.0.02'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}