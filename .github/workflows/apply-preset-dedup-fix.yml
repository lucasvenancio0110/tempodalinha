name: Apply preset dedup fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar correção
        run: python tools/apply_preset_dedup_fix.py
      - name: Validar duplicação e JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          e0 = text.rfind('function renderMachineEditor(machine, calc)')
          e1 = text.find('function ', e0 + 20)
          editor = text[e0:e1]
          r0 = text.rfind('function renderMachineResult(machine, calc)')
          r1 = text.find('function ', r0 + 20)
          result = text[r0:r1]
          assert editor.count('renderPresetEditorV13(machine, calc)') == 1
          assert editor.count('renderPresetV11(machine, calc)') == 0
          assert result.count('renderPresetDashboardV13(machine, calc)') == 1
          assert result.count('renderPresetV11(machine, calc)') == 0
          assert 'Preset recebido?' in text
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          assert scripts
          Path('/tmp/app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('Preset único no editor e dashboard')
          PY
          node --check /tmp/app.js
      - name: Commitar resultado
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Corrige duplicação do Preset"
          git push
