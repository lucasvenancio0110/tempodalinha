name: Invert Cell 05

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - TRIGGER_CELL_05.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Invert only Cell 05
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          raw = p.read_bytes()
          text = raw.decode('utf-8').replace('\r\n', '\n').replace('\r', '\n')
          old = '"05": [69,72,83,85,87,88,89,90,91,92,93,94,95],'
          new = '"05": [95,94,93,92,91,90,89,88,87,85,83,72,69],'
          if old in text:
              text = text.replace(old, new, 1)
          if text.count(new) != 1:
              raise SystemExit(f'Lista final da Célula 05 inválida: {text.count(new)}')
          p.write_bytes(text.replace('\n', '\r\n').encode('utf-8'))
          PY

      - name: Validate
        run: |
          grep -Fq '"05": [95,94,93,92,91,90,89,88,87,85,83,72,69],' index.html
          grep -Fq '"04": [42,52,53,57,58,59,60,61,64,65,66],' index.html
          grep -Fq '"06": [67,68,73,74,75,76,77,79,81,82,84,86],' index.html

      - name: Commit change
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'No changes.'
            exit 0
          fi
          git commit -m 'fix: inverter ordem da Célula 05'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
