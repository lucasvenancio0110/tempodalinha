name: Temporary restore line endings

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temp-restore-line-endings.yml

permissions:
  contents: write

jobs:
  restore-on-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/horario-base-individual
          fetch-depth: 0

      - name: Restore CRLF used by original file
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_bytes().decode('utf-8').replace('\r\n', '\n').replace('\r', '\n')
          path.write_bytes(text.replace('\n', '\r\n').encode('utf-8'))
          PY

      - name: Check JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          script = re.findall(r'<script>(.*?)</script>', html, flags=re.S)[-1]
          Path('/tmp/app.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Commit line-ending restoration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'chore: preservar padrão original de quebras de linha'
          git push origin HEAD:feature/horario-base-individual
