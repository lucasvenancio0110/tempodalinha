name: Apply PULSE CNC V12 Stage 1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - PULSE_V12_STAGE1_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply PULSE CNC V12 stage 1
        run: python scripts/apply_pulse_v12_stage1.py
      - name: Validate Python
        run: python -m py_compile scripts/apply_pulse_v12_stage1.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('JavaScript não encontrado')
          for index, script in enumerate(scripts):
              Path(f'/tmp/app-{index}.js').write_text(script, encoding='utf-8')
          print(len(scripts))
          PY
          for file in /tmp/app-*.js; do node --check "$file"; done
      - name: Validate requested defaults and identity
        run: |
          grep -Fq '<title>PULSE CNC | V12.0.0</title>' index.html
          grep -Fq 'kerfWidth: 1' index.html
          grep -Fq 'gabaritoMode: "individual"' index.html
          grep -Fq '<option value="individual">Campos individuais</option>' index.html
          grep -Fq 'PULSE CNC V12.0.0 — Etapa 1' index.html
      - name: Commit stage 1
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'feat: iniciar identidade e padrões da PULSE CNC V12'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
