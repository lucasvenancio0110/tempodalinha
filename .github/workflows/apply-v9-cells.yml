name: Apply V9 cells

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - TRIGGER_V9_CELLS.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply V9
        id: apply
        continue-on-error: true
        run: python scripts/apply_v9_cells.py > apply-v9.log 2>&1

      - name: Upload apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-v9-log
          path: apply-v9.log

      - name: Stop on apply failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat apply-v9.log
          exit 1

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('script ausente')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Validate cells and compact cards
        run: |
          grep -Fq '"01": [2,5,15,19,23,24,25,26,27,29,30,35,46,47,48]' index.html
          grep -Fq '"10": [124,125,126,127,128,129,130,134,135,136,137,138,139,140,141,142]' index.html
          grep -Fq 'formatTnl' index.html
          grep -Fq 'emptyMachine' index.html
          grep -Fq 'Trocar célula' index.html

      - name: Commit generated V9
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'feat: selecionar célula e carregar TNLs automaticamente'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
