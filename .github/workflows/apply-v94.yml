name: Apply V9.4

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply V9.4
        id: apply
        continue-on-error: true
        run: |
          python scripts/apply_v94.py > /tmp/v94-output.txt 2>&1
          status=$?
          cat /tmp/v94-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Save apply error
        if: steps.apply.outputs.status != '0'
        run: |
          cp /tmp/v94-output.txt V94_APPLY_ERROR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add V94_APPLY_ERROR.txt
          git commit -m 'ci: registrar erro da aplicação V9.4' || true
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Stop on apply failure
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('Script principal não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Validate changes
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          required = {
            'versão V9.4': '<title>Tempo da Linha | VENANC Tools V9.4</title>',
            'botão limpar': 'data-action="clearMachine"',
            'função limpar': 'function clearMachineData(machine)',
            'campo de início': 'calculationStartedAt: null',
            'registro exato': 'machine.calculationStartedAt = exactStart',
            'base alinhada': 'machine.baseTimestamp = exactStart',
            'milissegundos': 'String(date.getMilliseconds()).padStart(3, "0")',
            'cabeçalho relativo': '.appHeader {\n      position: relative;',
          }
          missing = [name for name, token in required.items() if token not in html]
          if missing:
              raise SystemExit('Validações ausentes: ' + ', '.join(missing))
          if '.appHeader {\n      position: sticky;' in html:
              raise SystemExit('Cabeçalho principal ainda está sticky')
          print('Validação estrutural aprovada.')
          PY

      - name: Commit V9.4
        run: |
          rm -f V94_APPLY_ERROR.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html V94_APPLY_ERROR.txt
          if git diff --cached --quiet; then
            echo 'V9.4 already applied.'
            exit 0
          fi
          git commit -m 'feat: cabeçalho normal, limpar dados e horário exato do cálculo'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
