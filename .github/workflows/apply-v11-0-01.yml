name: Apply V11.0.01

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - V11_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply V11.0.01
        run: python scripts/apply_v11_0_01.py

      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('Script principal não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Validate V11 structure
        run: |
          grep -Fq 'VENANC Tools V11.0.01' index.html
          grep -Fq 'function trayTotalV11' index.html
          grep -Fq 'calc.restMin < 16 * 60' index.html
          grep -Fq 'Produção dos turnos passados' index.html
          grep -Fq 'Até o fim do turno' index.html
          grep -Fq 'Ciclo em minutos' index.html
          git diff --check

      - name: Commit V11.0.01
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'V11.0.01 already applied.'
            exit 0
          fi
          git commit -m 'feat: painel operacional V11.0.01'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
