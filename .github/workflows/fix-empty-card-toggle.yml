name: Fix empty card toggle

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - TRIGGER_FIX_EMPTY_CARD.txt

permissions:
  contents: write

jobs:
  fix-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Fix empty card expansion
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          raw = p.read_bytes()
          nl = '\r\n' if b'\r\n' in raw else '\n'
          text = raw.decode('utf-8').replace('\r\n','\n').replace('\r','\n')
          old = '      node.classList.toggle("collapsed", isEmpty || !!machine.collapsed);'
          new = '      node.classList.toggle("collapsed", !!machine.collapsed);'
          if text.count(old) != 1:
              raise SystemExit(f'trecho esperado não encontrado: {text.count(old)}')
          text = text.replace(old, new, 1)
          text = text.replace('<title>Tempo da Linha | VENANC Tools V9</title>', '<title>Tempo da Linha | VENANC Tools V9.1</title>', 1)
          p.write_bytes(text.replace('\n', nl).encode('utf-8'))
          PY

      - name: Validate JavaScript and fix
        run: |
          grep -Fq 'node.classList.toggle("collapsed", !!machine.collapsed);' index.html
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Commit fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'fix: permitir abrir cards vazios'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
