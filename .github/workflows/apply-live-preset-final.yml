name: Apply live preset final

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar correção
        run: python tools/fix_live_preset_editor.py
      - name: Validar Preset ao vivo e JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          assert 'function refreshPresetEditorV14(machine)' in text
          assert 'data-v14-preset-editor' in text
          assert text.count('function refreshPresetEditorV14(machine)') == 1
          assert text.count('data-v14-preset-editor') >= 2
          assert 'refreshPresetEditorV14(machine);' in text
          scripts = re.findall(r'<script>(.*?)</script>', text, re.S)
          Path('/tmp/app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('Preset ao vivo validado')
          PY
          node --check /tmp/app.js
      - name: Commitar resultado
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Corrige exibição imediata do Preset"
          git push
