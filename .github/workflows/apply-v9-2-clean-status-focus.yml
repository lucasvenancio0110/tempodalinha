name: Apply V9.2 clean status and focus

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - TRIGGER_V9_2.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply V9.2
        run: python scripts/apply_v9_2_clean_status_focus.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html=Path('index.html').read_text(encoding='utf-8')
          scripts=re.findall(r'<script>(.*?)</script>',html,flags=re.S)
          Path('/tmp/app.js').write_text(scripts[-1],encoding='utf-8')
          PY
          node --check /tmp/app.js
      - name: Validate requested behavior
        run: |
          grep -Fq 'VENANC Tools V9.2' index.html
          grep -Fq 'Não encerra' index.html
          grep -Fq 'Encerra neste turno' index.html
          grep -Fq 'clockMain' index.html
          ! grep -Fq 'Preencha os dados da máquina' index.html
          ! grep -Fq '<strong>TNL <span data-role="titleMachine">' index.html
      - name: Commit generated version
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'feat: limpar cards e corrigir foco dos campos'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
