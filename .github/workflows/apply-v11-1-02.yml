name: Apply V11.1.02

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - V11_1_02_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply V11.1.02
        run: python scripts/apply_v11_1_02.py
      - name: Validate Python
        run: python -m py_compile scripts/apply_v11_1_02.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('JavaScript não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js
      - name: Validate layout markers
        run: |
          grep -Fq 'VENANC Tools V11.1.02' index.html
          grep -Fq 'overflow-y:auto' index.html
          grep -Fq 'grid-auto-rows:max-content' index.html
          grep -Fq '.compactOperatorV111 .compactBarsV111' index.html
      - name: Commit V11.1.02
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix: reorganizar editor compacto V11.1.02'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
