name: Apply PULSE CNC V12 Stage 2

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - PULSE_V12_STAGE2_TRIGGER.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply stage 2
        run: python scripts/apply_pulse_v12_stage2.py
      - name: Validate Python
        run: python -m py_compile scripts/apply_pulse_v12_stage2.py
      - name: Validate JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('JavaScript não encontrado')
          for index, script in enumerate(scripts):
              Path(f'/tmp/app-{index}.js').write_text(script, encoding='utf-8')
          PY
          for file in /tmp/app-*.js; do node --check "$file"; done
      - name: Validate V12 stage 2 markers
        run: |
          grep -Fq '<title>PULSE CNC | V12.1.0</title>' index.html
          grep -Fq 'function currentBarInfoV12' index.html
          grep -Fq 'class="machineView pulseDashboardV12"' index.html
          grep -Fq '<h3>Produção</h3>' index.html
          grep -Fq '<h3>Matéria-prima</h3>' index.html
          grep -Fq '<h3>Dados do cálculo</h3>' index.html
          ! grep -Fq 'Modo operador' index.html
          ! grep -Fq 'Preenchimento rápido' index.html
      - name: Commit stage 2
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'feat: reorganizar editor e dashboard da máquina na V12'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
