name: Temporary bottom button and detailed countdown

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/temp-bottom-button-countdown.yml

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply interface improvements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          raw = path.read_bytes()
          newline = '\r\n' if b'\r\n' in raw else '\n'
          text = raw.decode('utf-8').replace('\r\n', '\n').replace('\r', '\n')

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: esperado 1 trecho, encontrado {count}')
              text = text.replace(old, new, 1)

          def replace_count(old, new, expected, label):
              global text
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{label}: esperado {expected} trechos, encontrado {count}')
              text = text.replace(old, new)

          replace_once(
              '<title>Tempo da Linha | VENANC Tools V7</title>',
              '<title>Tempo da Linha | VENANC Tools V8</title>',
              'versão do título'
          )

          replace_once(
              '    .cards { display: flex; flex-direction: column; gap: 13px; }',
              '''    .cards { display: flex; flex-direction: column; gap: 13px; }
    .bottomAddWrap {
      display: flex;
      justify-content: center;
      padding: 17px 0 4px;
    }
    .bottomAddWrap .bottomAddBtn {
      width: min(100%, 320px);
      min-height: 52px;
      border-color: rgba(112, 237, 219, .42);
      border-radius: 15px;
      box-shadow: 0 14px 30px rgba(24, 169, 153, .22);
      font-size: 14px;
      letter-spacing: .01em;
    }
    .bottomAddBtn .addButtonIcon {
      width: 29px;
      height: 29px;
      display: inline-grid;
      place-items: center;
      border-radius: 9px;
      color: #eafffc;
      background: rgba(6, 40, 36, .22);
      font-size: 20px;
      line-height: 1;
    }
    .bottomAddBtn:hover { box-shadow: 0 17px 34px rgba(24, 169, 153, .28); }''',
              'estilo do botão inferior'
          )

          replace_once(
              '    .compactProjectionMetric strong { display:block; margin-top:8px; color:#1b3741; font-size:18px; line-height:1.08; letter-spacing:-.04em; overflow-wrap:anywhere; }',
              '''    .compactProjectionMetric strong { display:block; margin-top:8px; color:#1b3741; font-size:18px; line-height:1.08; letter-spacing:-.04em; overflow-wrap:anywhere; }
    .compactProjectionMetric.remainingMetric {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(86,213,199,.13), rgba(255,255,255,.72));
    }
    .compactProjectionMetric.remainingMetric::after {
      content: "";
      position: absolute;
      inset: auto -34px -42px auto;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(86,213,199,.18), transparent 68%);
      pointer-events: none;
    }
    .remainingLabel {
      display: flex !important;
      align-items: center;
      gap: 7px;
    }
    .remainingLabel::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 50%;
      background: var(--primary-2);
      box-shadow: 0 0 0 4px rgba(24,169,153,.12);
      animation: countdownPulse 1.2s ease-in-out infinite;
    }
    .liveCountdown {
      position: relative;
      z-index: 1;
      display: flex !important;
      align-items: baseline;
      gap: 2px;
      white-space: nowrap;
      color: #095f58 !important;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-variant-numeric: tabular-nums;
      overflow-wrap: normal !important;
    }
    .liveCountdown .countdownClock {
      font-size: clamp(18px, 2.7vw, 25px);
      font-weight: 950;
      line-height: 1;
      letter-spacing: -.075em;
    }
    .liveCountdown .countdownMs {
      min-width: 31px;
      color: #3f7f79;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: -.045em;
      opacity: .82;
    }
    @keyframes countdownPulse {
      0%, 100% { transform: scale(.86); opacity: .58; }
      50% { transform: scale(1); opacity: 1; }
    }''',
              'estilo do cronômetro'
          )

          replace_once(
              '      .compactProjectionMetric strong { font-size:16px; }',
              '''      .compactProjectionMetric strong { font-size:16px; }
      .liveCountdown .countdownClock { font-size:18px; }
      .liveCountdown .countdownMs { min-width:28px; font-size:10px; }''',
              'cronômetro no celular'
          )

          replace_once(
              '''    <div class="cards" id="cards"></div>
    <div class="empty" id="emptyState">Nenhuma máquina cadastrada.</div>''',
              '''    <div class="cards" id="cards"></div>
    <div class="empty" id="emptyState">Nenhuma máquina cadastrada.</div>
    <div class="bottomAddWrap">
      <button class="btn btnPrimary bottomAddBtn" id="addMachineBottomBtn" type="button">
        <span class="addButtonIcon" aria-hidden="true">＋</span>
        <span>Adicionar máquina</span>
      </button>
    </div>''',
              'botão inferior no HTML'
          )

          replace_once(
              '''            <div class="compactProjectionMetric">
              <span>Restante</span>
              <strong data-role="projectionRest">-</strong>
            </div>''',
              '''            <div class="compactProjectionMetric remainingMetric">
              <span class="remainingLabel">Restante</span>
              <strong class="liveCountdown" data-role="projectionRest" aria-label="Tempo restante">
                <span class="countdownClock" data-role="countdownClock">--:--:--</span>
                <small class="countdownMs" data-role="countdownMs">.---</small>
              </strong>
            </div>''',
              'estrutura do cronômetro'
          )

          replace_once(
              '      V7 — horário-base individual + previsão fixa + remaining time em tempo real',
              '      V8 — botão inferior + cronômetro detalhado em tempo real',
              'versão do comentário'
          )

          replace_once(
              '''      9. Zoom por pinça, duplo toque e foco de campo bloqueado no iPhone.
    */''',
              '''      9. Zoom por pinça, duplo toque e foco de campo bloqueado no iPhone.
      10. Botão para adicionar máquina também abaixo do último card.
      11. Tempo restante exibido como HH:MM:SS.mmm, com atualização visual suave.
    */''',
              'notas da versão'
          )

          replace_once(
              '''    function formatMinutes(totalMin) {
      if (totalMin == null || !Number.isFinite(totalMin)) return "-";
      const min = totalMin > 0 ? Math.ceil(totalMin) : 0;
      return `${Math.floor(min / 60)}h ${pad2(min % 60)}min`;
    }

    function formatCycle(minutes) {''',
              '''    function formatMinutes(totalMin) {
      if (totalMin == null || !Number.isFinite(totalMin)) return "-";
      const min = totalMin > 0 ? Math.ceil(totalMin) : 0;
      return `${Math.floor(min / 60)}h ${pad2(min % 60)}min`;
    }

    function formatCountdownParts(totalMs) {
      const safeMs = Number.isFinite(totalMs) ? Math.max(0, Math.floor(totalMs)) : 0;
      const hours = Math.floor(safeMs / 3600000);
      const minutes = Math.floor((safeMs % 3600000) / 60000);
      const seconds = Math.floor((safeMs % 60000) / 1000);
      const milliseconds = safeMs % 1000;
      return {
        clock: `${String(hours).padStart(2, "0")}:${pad2(minutes)}:${pad2(seconds)}`,
        milliseconds: String(milliseconds).padStart(3, "0")
      };
    }

    function formatCountdownShort(totalMs) {
      const parts = formatCountdownParts(totalMs);
      return parts.clock;
    }

    function formatCycle(minutes) {''',
              'funções do cronômetro'
          )

          replace_count(
              '          restMin: 0,',
              '          restMin: 0,\n          restMs: 0,',
              2,
              'restMs nos retornos imediatos'
          )

          replace_once(
              '      const restMin = Math.max(0, (endDT - nowDT) / 60000);',
              '''      const restMs = Math.max(0, endDT.getTime() - nowDT.getTime());
      const restMin = restMs / 60000;''',
              'cálculo de milissegundos restantes'
          )

          replace_once(
              '''        endDT,
        restMin,
        forecastReached,''',
              '''        endDT,
        restMin,
        restMs,
        forecastReached,''',
              'restMs no retorno principal'
          )

          replace_once(
              '        miniRest.textContent = calc.status === "reached" ? "Previsão atingida" : `${formatMinutes(calc.restMin)} restantes`;',
              '        miniRest.textContent = calc.status === "reached" ? "Previsão atingida" : `${formatCountdownShort(calc.restMs)} restantes`;',
              'contador compacto no cabeçalho'
          )

          replace_once(
              '''      renderNotice(root, calc);
      const requestBox = root.querySelector('[data-role="requestBox"]');''',
              '''      updateCountdownDisplay(root, calc);
      renderNotice(root, calc);
      const requestBox = root.querySelector('[data-role="requestBox"]');''',
              'atualização do cronômetro no card'
          )

          replace_once(
              '''    function refreshLiveRemaining() {
      const calcs = [];
      state.machines.forEach(machine => {
        const calc = calcMachine(machine);
        calcs.push(calc);
        const root = [...document.querySelectorAll(".machineCard")].find(card => card.dataset.id === machine.id);
        if (root) applyDynamicCard(root, machine, calc);
      });
      updateSummary(calcs);
      el.baseShift.textContent = shiftName(getShiftWindowFor(new Date()).id);
    }''',
              '''    let lastFullDynamicRefresh = 0;

    function refreshLiveRemaining(timestamp = performance.now()) {
      const fullRefresh = timestamp - lastFullDynamicRefresh >= 1000;
      const calcs = [];
      const cardsById = new Map(
        [...document.querySelectorAll(".machineCard")].map(card => [card.dataset.id, card])
      );

      state.machines.forEach(machine => {
        const calc = calcMachine(machine);
        const root = cardsById.get(machine.id);
        if (root) {
          updateCountdownDisplay(root, calc);
          if (fullRefresh) applyDynamicCard(root, machine, calc);
        }
        if (fullRefresh) calcs.push(calc);
      });

      if (fullRefresh) {
        updateSummary(calcs);
        el.baseShift.textContent = shiftName(getShiftWindowFor(new Date()).id);
        lastFullDynamicRefresh = timestamp;
      }
    }''',
              'atualização suave e otimizada'
          )

          replace_once(
              '''    function renderNotice(root, calc) {
      const card = root.querySelector('[data-role="projectionCard"]');''',
              '''    function updateCountdownDisplay(root, calc) {
      const wrap = root.querySelector('[data-role="projectionRest"]');
      const clock = root.querySelector('[data-role="countdownClock"]');
      const milliseconds = root.querySelector('[data-role="countdownMs"]');
      if (!wrap || !clock || !milliseconds) return;

      if (!calc.valid || !calc.endDT) {
        clock.textContent = "--:--:--";
        milliseconds.textContent = ".---";
        wrap.setAttribute("aria-label", "Tempo restante indisponível");
        return;
      }

      const parts = formatCountdownParts(calc.restMs);
      clock.textContent = parts.clock;
      milliseconds.textContent = `.${parts.milliseconds}`;
      wrap.setAttribute("aria-label", `${parts.clock}.${parts.milliseconds} restantes`);
    }

    function renderNotice(root, calc) {
      const card = root.querySelector('[data-role="projectionCard"]');''',
              'renderizador do cronômetro'
          )

          replace_once(
              '      const rest = root.querySelector(\'[data-role="projectionRest"]\');\n',
              '',
              'remover referência antiga de restante'
          )

          replace_once(
              '        rest.textContent = "-";\n',
              '',
              'remover preenchimento antigo inválido'
          )

          replace_once(
              '      rest.textContent = formatMinutes(calc.restMin);\n',
              '',
              'remover formato antigo de minutos'
          )

          replace_once(
              '''    document.querySelector("#addMachineBtn").addEventListener("click", () => {
      state.machines.forEach(machine => machine.collapsed = true);
      const newMachine = DEFAULT_MACHINE();
      newMachine.collapsed = false;
      state.machines.push(newMachine);
      render();
    });''',
              '''    function addMachine() {
      state.machines.forEach(machine => machine.collapsed = true);
      const newMachine = DEFAULT_MACHINE();
      newMachine.collapsed = false;
      state.machines.push(newMachine);
      render();
      requestAnimationFrame(() => {
        const newCard = document.querySelector(`.machineCard[data-id="${newMachine.id}"]`);
        newCard?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    document.querySelector("#addMachineBtn").addEventListener("click", addMachine);
    document.querySelector("#addMachineBottomBtn").addEventListener("click", addMachine);''',
              'função compartilhada para adicionar máquina'
          )

          replace_once(
              '''    blockIOSZoom();
    render();
    updateLiveClock();
    setInterval(() => {
      updateLiveClock();
      refreshLiveRemaining();
    }, 1000);''',
              '''    function animateLiveRemaining(timestamp) {
      refreshLiveRemaining(timestamp);
      requestAnimationFrame(animateLiveRemaining);
    }

    blockIOSZoom();
    render();
    updateLiveClock();
    setInterval(updateLiveClock, 1000);
    requestAnimationFrame(animateLiveRemaining);''',
              'loop visual do cronômetro'
          )

          required = [
              'id="addMachineBottomBtn"',
              'formatCountdownParts',
              'countdownClock',
              'countdownMs',
              'restMs',
              'requestAnimationFrame(animateLiveRemaining)',
              'document.querySelector("#addMachineBottomBtn").addEventListener("click", addMachine)'
          ]
          for token in required:
              if token not in text:
                  raise SystemExit(f'Token obrigatório ausente: {token}')

          output = text.replace('\n', newline)
          path.write_bytes(output.encode('utf-8'))
          print('Melhorias aplicadas ao index.html.')
          PY

      - name: Validate JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('Script principal não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Test countdown precision and fixed forecast
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script>([\s\S]*?)<\/script>/g)];
          const source = scripts[scripts.length - 1][1];
          const cutoff = source.indexOf('document.querySelector("#addMachineBtn")');
          if (cutoff < 0) throw new Error('Ponto de corte não encontrado');

          const NativeDate = Date;
          let mockNow = new NativeDate(2026, 6, 8, 17, 30, 15, 250).getTime();
          class MockDate extends NativeDate {
            constructor(...args) { super(...(args.length ? args : [mockNow])); }
            static now() { return mockNow; }
          }

          const context = {
            console,
            Date: MockDate,
            Math,
            Number,
            String,
            Array,
            Object,
            Map,
            JSON,
            NaN,
            performance: { now: () => 0 },
            crypto: { randomUUID: () => 'machine-test' },
            localStorage: { getItem: () => null, setItem: () => {} },
            document: { querySelector: () => ({}), querySelectorAll: () => [], addEventListener: () => {} },
            window: { open: () => {} },
            setTimeout: () => 0,
            clearTimeout: () => {},
            setInterval: () => 0,
            requestAnimationFrame: () => 0,
            setMockNow: value => { mockNow = value; }
          };

          const testCode = `${source.slice(0, cutoff)}
            const base = new Date(2026, 6, 8, 16, 0, 0, 0).getTime();
            const machine = DEFAULT_MACHINE(base);
            Object.assign(machine, {
              timeInput: '2,24',
              pieceLength: '1',
              target: '100',
              barMode: 'pieces',
              partialPieces: '100',
              fullBars: 0
            });
            const first = calcMachine(machine);
            const firstParts = formatCountdownParts(first.restMs);
            if (fmtTime(first.endDT) !== '20:00') throw new Error('Previsão deveria permanecer 20:00');
            if (firstParts.clock !== '02:29:44' || firstParts.milliseconds !== '750') {
              throw new Error('Cronômetro incorreto: ' + JSON.stringify(firstParts));
            }
            setMockNow(new Date(2026, 6, 8, 17, 30, 15, 375).getTime());
            const second = calcMachine(machine);
            const secondParts = formatCountdownParts(second.restMs);
            if (fmtTime(second.endDT) !== '20:00') throw new Error('Previsão foi deslocada');
            if (secondParts.milliseconds !== '625') throw new Error('Milissegundos não atualizaram corretamente');
            if (machine.baseTimestamp !== base) throw new Error('Horário-base foi alterado');
          `;

          vm.runInNewContext(testCode, context);
          console.log('Teste funcional aprovado.');
          NODE

      - name: Validate HTML and diff
        run: |
          git diff --check
          grep -q 'id="addMachineBottomBtn"' index.html
          grep -q 'HH:MM:SS.mmm' index.html
          grep -q 'class="liveCountdown"' index.html
          grep -q 'requestAnimationFrame(animateLiveRemaining)' index.html

      - name: Commit published improvement
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'feat: adicionar botão inferior e cronômetro detalhado'
          git push origin HEAD:main
