name: Apply V8 on pull request

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - TRIGGER_V8_PR.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply V8 patch
        run: python scripts/apply_v8_bottom_countdown.py

      - name: Validate JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
          if not scripts:
              raise SystemExit('Script principal não encontrado')
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Validate countdown format
        run: |
          grep -q 'id="addMachineBottomBtn"' index.html
          grep -q 'formatCountdownParts' index.html
          grep -q 'countdownClock' index.html
          grep -q 'countdownMs' index.html
          grep -q 'setInterval(refreshLiveRemaining, 50)' index.html
          git diff --check

      - name: Commit generated V8
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'V8 already applied.'
            exit 0
          fi
          git commit -m 'feat: adicionar botão inferior e cronômetro detalhado'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
