name: Apply preset flow fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar correção
        run: python tools/apply_preset_flow_fix.py
      - name: Validar fluxo do Preset
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text=Path('index.html').read_text(encoding='utf-8')
          required=[
            'renderPresetEditorV13',
            'renderPresetDashboardV13',
            'O setor do Preset já trouxe a nova OP?',
            'A próxima OP será',
            'Item solicitado',
            'PRESET PENDENTE',
            'PRESET RECEBIDO',
            '${renderPresetEditorV13(machine, calc)}',
            '${renderPresetDashboardV13(machine, calc)}'
          ]
          for marker in required: assert marker in text, marker
          editor=text[text.rfind('function renderPresetEditorV13'):text.find('function renderPresetDashboardV13', text.rfind('function renderPresetEditorV13'))]
          assert 'presetType' in editor
          assert editor.index('received') < editor.index('presetType')
          dashboard=text[text.rfind('function renderPresetDashboardV13'):text.find('function renderPresetV11', text.rfind('function renderPresetDashboardV13'))]
          assert 'data-v10-field' not in dashboard
          assert 'data-v10-action' not in dashboard
          scripts=re.findall(r'<script>(.*?)</script>', text, re.S)
          Path('/tmp/app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('Fluxo do Preset aprovado')
          PY
          node --check /tmp/app.js
      - name: Commitar resultado
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Corrige fluxo de edição e consulta do Preset"
          git push
