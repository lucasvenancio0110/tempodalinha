<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tempo da Linha</title>
  <style>
    :root {
      --bg: #101419;
      --panel: #171d24;
      --panel-2: #202832;
      --card: #ffffff;
      --ink: #17202a;
      --muted: #6c7785;
      --line: #dfe5ec;
      --primary: #14b8a6;
      --primary-2: #0f766e;
      --blue: #2563eb;
      --ok: #15803d;
      --ok-bg: #e9f9ef;
      --warn: #b45309;
      --warn-bg: #fff5df;
      --bad: #b91c1c;
      --bad-bg: #fff0f0;
      --soft: #f6f8fb;
      --radius: 8px;
      --shadow: 0 14px 40px rgba(7, 12, 20, .16);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: #f8fafc;
      background:
        linear-gradient(180deg, rgba(20, 184, 166, .08), transparent 280px),
        var(--bg);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .appHeader {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(16, 20, 25, .94);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .headerInner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .brandRow { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #dffaf6;
      color: #075e55;
      font-weight: 900;
    }
    .brandTitle { min-width: 0; }
    .brandTitle strong { display: block; font-size: 18px; line-height: 1.15; }
    .brandTitle span { display: block; color: #aab7c7; font-size: 12px; margin-top: 2px; }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btnPrimary { background: var(--primary); color: #06201d; }
    .btnPrimary:hover { background: #2dd4bf; }
    .btnGhost { background: rgba(255,255,255,.08); color: #f8fafc; border-color: rgba(255,255,255,.14); }
    .btnGhost:hover { background: rgba(255,255,255,.13); }
    .btnLight { background: #fff; color: var(--ink); border-color: var(--line); }
    .btnDanger { background: var(--bad-bg); color: var(--bad); border-color: #ffd2d2; }
    .iconBtn {
      width: 38px;
      height: 38px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      display: inline-grid;
      place-items: center;
      font-size: 17px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 16px 96px;
    }
    .basePanel {
      display: grid;
      grid-template-columns: 1fr 1fr minmax(180px, .8fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      background: var(--panel);
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: #b8c4d4;
      margin-bottom: 6px;
    }
    .machineCard .field label,
    dialog .field label {
      color: #536170;
    }
    .input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 16px;
      font-weight: 700;
    }
    .input:focus, select:focus {
      outline: 3px solid rgba(20,184,166,.18);
      border-color: var(--primary);
    }
    .metricBlock {
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      padding: 9px 10px;
    }
    .metricBlock .label { color: #b8c4d4; font-size: 12px; font-weight: 800; }
    .metricBlock .value { margin-top: 3px; font-size: 18px; font-weight: 900; }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .machineCard {
      color: var(--ink);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .cardHead {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfcfe);
    }
    .cardName {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      min-width: 0;
    }
    .cardName strong { font-size: 17px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid #e5eaf0;
      background: #f3f6fa;
      color: #516070;
    }
    .badge.ok { background: var(--ok-bg); color: var(--ok); border-color: #c8efd5; }
    .badge.warn { background: var(--warn-bg); color: var(--warn); border-color: #ffe3a9; }
    .badge.bad { background: var(--bad-bg); color: var(--bad); border-color: #ffd2d2; }
    .headActions { display: flex; gap: 6px; }
    .cardBody { padding: 12px; }
    .machineCard.collapsed .cardBody { display: none; }

    .grid2, .grid3 {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    .grid2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .inlineControls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: end;
    }
    .section {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: var(--radius);
      padding: 10px;
      margin-top: 10px;
    }
    .sectionTitle {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      font-weight: 900;
      color: #263241;
      margin-bottom: 8px;
    }
    .sectionTitle .btn {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }
    .section.collapsedSection .sectionContent {
      display: none;
    }
    .segmented {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .segmented label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }
    .segmented input { accent-color: var(--primary-2); }
    .preview {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-top: 8px;
    }

    .trayList { display: flex; flex-direction: column; gap: 8px; }
    .trayRow {
      display: grid;
      grid-template-columns: 1fr 38px;
      gap: 8px;
    }
    .trayFooter, .cardFooter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .totalText { color: #435061; font-size: 13px; font-weight: 900; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .kpi {
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 9px;
    }
    .kpi strong {
      display: block;
      color: #111827;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-top: 5px;
    }
    .notice {
      margin-top: 10px;
      border-radius: var(--radius);
      border: 1px solid #e5eaf0;
      padding: 10px;
      font-weight: 800;
      line-height: 1.5;
      background: #f8fafc;
    }
    .notice.ok { background: var(--ok-bg); color: #075d2a; border-color: #c8efd5; }
    .notice.warn { background: var(--warn-bg); color: #704000; border-color: #ffe3a9; }
    .notice.bad { background: var(--bad-bg); color: #7a1010; border-color: #ffd2d2; }
    .notice small { display: block; margin-top: 5px; color: inherit; opacity: .86; font-size: 12px; }
    .requestBox { display: none; }
    .requestBox.visible { display: block; }

    .empty {
      display: none;
      color: #bac6d6;
      border: 1px dashed rgba(255,255,255,.2);
      border-radius: var(--radius);
      padding: 24px 12px;
      text-align: center;
      font-weight: 800;
    }
    .empty.visible { display: block; }

    dialog {
      width: min(560px, calc(100vw - 24px));
      border: 0;
      border-radius: var(--radius);
      padding: 0;
      box-shadow: 0 25px 80px rgba(0,0,0,.36);
    }
    dialog::backdrop { background: rgba(5, 10, 16, .62); }
    .modalHead, .modalBody, .modalFoot { padding: 14px; }
    .modalHead {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .modalHead strong { font-size: 18px; color: var(--ink); }
    .modalBody { color: var(--ink); }
    .modalFoot {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--line);
      background: #f8fafc;
    }

    @media (max-width: 900px) {
      .headerInner, .basePanel, .grid2, .grid3 { grid-template-columns: 1fr; }
      .toolbar { justify-content: stretch; }
      .toolbar .btn { flex: 1; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .cardHead { grid-template-columns: 1fr; }
      .headActions { justify-content: flex-end; }
      .inlineControls { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .cardFooter .btn, .trayFooter .btn { width: auto; }
    }
  </style>
</head>
<body>
  <header class="appHeader">
    <div class="headerInner">
      <div class="brandRow">
        <div class="mark">EC</div>
        <div class="brandTitle">
          <strong>TEMPO DA LINHA</strong>
          <span></span>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn btnPrimary" id="addMachineBtn" type="button">+ Maquina</button>
        <button class="btn btnGhost" id="calcAllBtn" type="button">Calcular</button>
        <button class="btn btnGhost" id="settingsBtn" type="button">Ajustes</button>
      </div>
    </div>
  </header>

  <main>
    <section class="basePanel" aria-label="Base de calculo">
      <div class="field">
        <label for="baseDate">Data</label>
        <input class="input" id="baseDate" type="date">
      </div>
      <div class="field">
        <label for="baseTime">Hora</label>
        <input class="input" id="baseTime" type="time" step="60">
      </div>
      <div class="metricBlock">
        <div class="label">Turno</div>
        <div class="value" id="baseShift">-</div>
      </div>
    </section>

    <div class="cards" id="cards"></div>
    <div class="empty" id="emptyState">Nenhuma maquina cadastrada.</div>
  </main>

  <dialog id="settingsModal">
    <form method="dialog" id="settingsForm">
      <div class="modalHead">
        <strong>Ajustes de calculo</strong>
        <button class="iconBtn" value="cancel" type="submit" aria-label="Fechar">x</button>
      </div>
      <div class="modalBody">
        <div class="grid2">
          <div class="field">
            <label for="barLength">Comprimento da barra (mm)</label>
            <input class="input" id="barLength" type="number" min="1" step="0.01">
          </div>
          <div class="field">
            <label for="kerfWidth">Largura do bedame (mm)</label>
            <input class="input" id="kerfWidth" type="number" min="0" step="0.01">
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label for="requestLimit">Mostrar proxima OP ate (horas)</label>
            <input class="input" id="requestLimit" type="number" min="1" step="1">
          </div>
          <div class="field">
            <label for="turnMinutes">Meta por turno usa (minutos)</label>
            <input class="input" id="turnMinutes" type="number" min="1" step="1">
          </div>
        </div>
        <div class="notice">
          O calculo da materia-prima usa: comprimento da peca + largura do bedame. Exemplo: peca 32 mm com bedame 1 mm ocupa 33 mm por peca.
        </div>
      </div>
      <div class="modalFoot">
        <button class="btn btnLight" value="cancel" type="submit">Cancelar</button>
        <button class="btn btnPrimary" id="saveSettingsBtn" value="default" type="button">Salvar ajustes</button>
      </div>
    </form>
  </dialog>

  <template id="cardTemplate">
    <article class="machineCard">
      <div class="cardHead">
        <div class="cardName">
          <strong>Maquina <span data-role="titleMachine">-</span></strong>
          <span class="badge" data-role="statusBadge">Aguardando dados</span>
          <span class="badge" data-role="miniInfo">-</span>
        </div>
        <div class="headActions">
          <button class="iconBtn" data-action="toggle" type="button" title="Minimizar">↕</button>
          <button class="iconBtn" data-action="remove" type="button" title="Remover">×</button>
        </div>
      </div>
      <div class="cardBody">
        <div class="grid2">
          <div class="field">
            <label>Maquina</label>
            <input class="input" data-field="machine" placeholder="Ex.: 98">
          </div>
          <div class="field">
            <label>Tempo por peca</label>
            <input class="input" data-field="timeInput" inputmode="decimal" placeholder="Ex.: 2,30 / 1:45 / 90s">
          </div>
        </div>
        <div class="section">
          <div class="sectionTitle">Barra atual</div>
          <div class="segmented" data-role="barMode"></div>
          <div class="grid2" style="margin-top:10px">
            <div class="field" data-role="partialMmWrap">
              <label>mm restantes na barra atual</label>
              <input class="input" data-field="partialMm" type="number" min="0" step="0.01" placeholder="Ex.: 1360">
            </div>
            <div class="field" data-role="partialPiecesWrap">
              <label>Pecas restantes na barra atual</label>
              <input class="input" data-field="partialPieces" type="number" min="0" step="1" placeholder="Ex.: 40">
            </div>
          </div>
          <div class="field" style="margin-top:10px">
            <label>Barras inteiras no alimentador</label>
            <div class="inlineControls">
              <input class="input" data-field="fullBars" type="number" min="0" step="1">
              <button class="btn btnLight" data-action="minusBar" type="button">-1</button>
              <button class="btn btnLight" data-action="plusBar" type="button">+1</button>
            </div>
          </div>
          <div class="preview" data-role="mpPreview">Producao possivel com esta MP: -</div>
        </div>

        <div class="grid2" style="margin-top:10px">
          <div class="field">
            <label>Meta da ordem / OP (pecas)</label>
            <input class="input" data-field="target" type="number" min="0" step="1" placeholder="Ex.: 1000">
          </div>
          <div class="field">
            <label>Comprimento da peca (mm)</label>
            <input class="input" data-field="pieceLength" type="number" min="1" step="0.01" placeholder="Ex.: 32">
          </div>
        </div>

        <div class="section" data-role="traysSection">
          <div class="sectionTitle">
            <span>Gabaritos produzidos</span>
            <button class="btn btnLight" data-action="toggleTrays" type="button">Abrir</button>
          </div>
          <div class="sectionContent">
            <div class="totalText" data-role="trayTotal">Total: 0 pecas</div>
            <div class="trayList" data-role="trayList" style="margin-top:8px"></div>
            <div class="trayFooter">
              <button class="btn btnLight" data-action="addTray" type="button">+ Gabarito</button>
              <button class="btn btnPrimary" data-action="lockTrays" type="button">Concluir gabaritos</button>
            </div>
          </div>
        </div>

        <div class="grid2" style="margin-top:10px">
          <div class="field">
            <label>Produzidas pelos gabaritos</label>
            <input class="input" data-role="producedOutput" readonly>
          </div>
        </div>

        <div class="kpis" data-role="kpis"></div>
        <div class="notice" data-role="notice">Preencha os dados para calcular.</div>

        <div class="section requestBox" data-role="requestBox">
          <div class="sectionTitle">Proxima OP / Preset</div>
          <div class="segmented" data-role="presetMode"></div>
          <div class="grid2" data-role="presetYesWrap" style="margin-top:10px">
            <div class="field">
              <label>Tipo de preset</label>
              <select data-field="presetType">
                <option value="sequencia">Sequencia</option>
                <option value="azul">Setup Azul</option>
                <option value="verde">Setup Verde</option>
                <option value="vermelho">Setup Vermelho</option>
              </select>
            </div>
          </div>
          <div class="grid2" data-role="presetNoWrap" style="margin-top:10px">
            <div class="field">
              <label>Hora para solicitar</label>
              <input class="input" data-field="requestTime" type="time" step="60">
            </div>
            <div class="field">
              <label>Codigo da OP / Item</label>
              <input class="input" data-field="itemCode" maxlength="20" placeholder="Ex.: 125.142-1">
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script>
    const STORAGE_KEY = "expertcnc-reformulado-v1";
    const DEFAULT_SETTINGS = {
      barLength: 3600,
      kerfWidth: 2,
      requestLimit: 16,
      turnMinutes: 480
    };
    const DEFAULT_MACHINE = () => ({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
      machine: "",
      timeInput: "",
      pieceLength: "",
      fullBars: 0,
      barMode: "pieces",
      partialMm: "",
      partialPieces: "",
      trays: [""],
      traysLocked: false,
      traysCollapsed: true,
      target: "",
      presetMode: "no",
      presetType: "sequencia",
      requestTime: "",
      itemCode: "",
      collapsed: false
    });

    const state = loadState();
    const el = {
      cards: document.querySelector("#cards"),
      empty: document.querySelector("#emptyState"),
      baseDate: document.querySelector("#baseDate"),
      baseTime: document.querySelector("#baseTime"),
      baseShift: document.querySelector("#baseShift"),
      modal: document.querySelector("#settingsModal"),
      barLength: document.querySelector("#barLength"),
      kerfWidth: document.querySelector("#kerfWidth"),
      requestLimit: document.querySelector("#requestLimit"),
      turnMinutes: document.querySelector("#turnMinutes")
    };

    function loadState() {
      const now = new Date();
      const base = {
        date: `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`,
        time: `${pad2(now.getHours())}:${pad2(now.getMinutes())}`
      };
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved && saved.settings && Array.isArray(saved.machines)) {
          return {
            settings: { ...DEFAULT_SETTINGS, ...saved.settings },
            base: { ...base, ...(saved.base || {}) },
            machines: saved.machines.length ? saved.machines.map(normalizeMachine) : [DEFAULT_MACHINE()]
          };
        }
      } catch (_) {}
      return { settings: { ...DEFAULT_SETTINGS }, base, machines: [DEFAULT_MACHINE()] };
    }

    function normalizeMachine(machine) {
      return {
        ...DEFAULT_MACHINE(),
        ...machine,
        trays: Array.isArray(machine.trays) && machine.trays.length ? machine.trays : [""],
        traysCollapsed: machine.traysCollapsed !== false
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function fmtDate(d) {
      if (!d) return "-";
      return `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    function fmtTime(d) {
      if (!d) return "-";
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    function plural(n, one, many) {
      return Number(n) === 1 ? one : many;
    }

    function parseNumber(value) {
      if (value === "" || value == null) return NaN;
      return Number(String(value).replace(",", "."));
    }

    function parseInteger(value) {
      const n = parseInt(value, 10);
      return Number.isFinite(n) ? n : 0;
    }

    function parseTempoToMinutes(input) {
      if (input == null) return NaN;
      let s = String(input).trim().toLowerCase().replace(/\s+/g, "");
      if (!s) return NaN;
      if (s.includes(",")) {
        const parts = s.split(",");
        const m = parseInt(parts[0], 10) || 0;
        const sec = parseInt((parts[1] || "0").padEnd(2, "0").slice(0, 2), 10) || 0;
        return m + sec / 60;
      }
      if (s.includes(":")) {
        const parts = s.split(":");
        return (parseInt(parts[0], 10) || 0) + (parseInt(parts[1], 10) || 0) / 60;
      }
      if (/^\d+(\.\d+)?s$/.test(s)) return parseFloat(s.replace("s", "")) / 60;
      const mMatch = s.match(/(\d+)(?=m)/i);
      const sMatch = s.match(/(\d+)(?=s)/i);
      if (mMatch) return parseInt(mMatch[1], 10) + (sMatch ? parseInt(sMatch[1], 10) : 0) / 60;
      const n = parseFloat(s.replace(",", "."));
      return Number.isFinite(n) ? n : NaN;
    }

    function getBaseDateTime() {
      const [y, m, d] = state.base.date.split("-").map(Number);
      const [hh, mm] = state.base.time.split(":").map(Number);
      if (!y || !m || !d || !Number.isFinite(hh) || !Number.isFinite(mm)) return new Date();
      return new Date(y, m - 1, d, hh, mm, 0, 0);
    }

    function getShiftWindowFor(date) {
      const base = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0, 0);
      const mk = (h, m, plus = 0) => {
        const d = new Date(base);
        d.setDate(d.getDate() + plus);
        d.setHours(h, m, 0, 0);
        return d;
      };
      const minutes = date.getHours() * 60 + date.getMinutes();
      const m0630 = 6 * 60 + 30;
      const m1440 = 14 * 60 + 40;
      const m2240 = 22 * 60 + 40;
      if (minutes < m0630) return { id: 3, startDT: mk(22, 40, -1), endDT: mk(6, 30, 0) };
      if (minutes < m1440) return { id: 1, startDT: mk(6, 30, 0), endDT: mk(14, 40, 0) };
      if (minutes < m2240) return { id: 2, startDT: mk(14, 40, 0), endDT: mk(22, 40, 0) };
      return { id: 3, startDT: mk(22, 40, 0), endDT: mk(6, 30, 1) };
    }

    function nextShiftWindow(prevEnd, prevId) {
      const nextId = prevId === 3 ? 1 : prevId + 1;
      const map = { 1: [6, 30, 14, 40], 2: [14, 40, 22, 40], 3: [22, 40, 6, 30] };
      const base = new Date(prevEnd.getFullYear(), prevEnd.getMonth(), prevEnd.getDate(), 0, 0, 0, 0);
      const s = new Date(base);
      s.setHours(map[nextId][0], map[nextId][1], 0, 0);
      const e = new Date(base);
      if (nextId === 3) {
        e.setDate(e.getDate() + 1);
        e.setHours(map[nextId][2], map[nextId][3], 0, 0);
      } else {
        e.setHours(map[nextId][2], map[nextId][3], 0, 0);
        if (e <= s) e.setDate(e.getDate() + 1);
      }
      if (s < prevEnd) s.setTime(prevEnd.getTime());
      return { id: nextId, startDT: s, endDT: e };
    }

    function shiftName(id) {
      return `${id}o turno`;
    }

    function formatMinutes(totalMin) {
      if (totalMin == null || !Number.isFinite(totalMin)) return "-";
      const min = Math.max(0, Math.floor(totalMin));
      return `${Math.floor(min / 60)}h ${pad2(min % 60)}min`;
    }

    function formatCycle(minutes) {
      if (!Number.isFinite(minutes)) return "-";
      const m = Math.floor(minutes);
      const s = Math.round((minutes - m) * 60);
      return `${m}m ${pad2(s)}s - ${minutes.toFixed(2).replace(".", ",")} min`;
    }

    function calcMachine(machine) {
      const baseDT = getBaseDateTime();
      const tempoMin = parseTempoToMinutes(machine.timeInput);
      const pieceLength = parseNumber(machine.pieceLength);
      const target = parseInteger(machine.target);
      const produced = machine.trays.reduce((sum, value) => sum + parseInteger(value), 0);
      const remainingOP = Math.max(0, target - produced);
      const barLength = Math.max(0, parseNumber(state.settings.barLength) || 0);
      const kerfWidth = Math.max(0, parseNumber(state.settings.kerfWidth) || 0);
      const step = pieceLength + kerfWidth;

      const valid = Number.isFinite(tempoMin) && tempoMin > 0 && Number.isFinite(pieceLength) && pieceLength > 0 && target >= 0;
      const perBar = valid && step > 0 ? Math.floor(barLength / step) : 0;
      let currentBar = 0;
      if (valid) {
        if (machine.barMode === "full") currentBar = perBar;
        if (machine.barMode === "partialMm") currentBar = Math.floor(Math.max(0, parseNumber(machine.partialMm) || 0) / step);
        if (machine.barMode === "pieces") currentBar = Math.max(0, parseInteger(machine.partialPieces));
      }
      const fullBars = Math.max(0, parseInteger(machine.fullBars));
      const capacity = Math.max(0, fullBars * perBar + currentBar);
      const producible = Math.min(remainingOP, capacity);
      const metaTurno = Number.isFinite(tempoMin) && tempoMin > 0 ? Math.floor((parseInteger(state.settings.turnMinutes) || 480) / tempoMin) : 0;

      if (!valid) {
        return {
          valid: false,
          produced,
          perBar,
          capacity,
          remainingOP,
          status: "idle",
          statusText: "Aguardando dados",
          badgeClass: "",
          noticeClass: "",
          noticeTitle: "Preencha tempo, comprimento da peca e meta da OP.",
          kpis: baseKpis()
        };
      }

      if (remainingOP === 0) {
        return {
          valid: true,
          produced,
          perBar,
          capacity,
          remainingOP,
          metaTurno,
          status: "done",
          statusText: "OP finalizada",
          badgeClass: "ok",
          noticeClass: "ok",
          noticeTitle: "OP ja atingiu a meta.",
          reason: "meta",
          endDT: baseDT,
          restMin: 0,
          showRequest: false,
          kpis: buildKpis(metaTurno, tempoMin, remainingOP, capacity, baseDT, 0)
        };
      }

      if (capacity <= 0) {
        return {
          valid: true,
          produced,
          perBar,
          capacity,
          remainingOP,
          metaTurno,
          status: "now",
          statusText: "Sem MP",
          badgeClass: "bad",
          noticeClass: "bad",
          noticeTitle: "Sem materia-prima disponivel para continuar.",
          reason: "mp",
          endDT: baseDT,
          restMin: 0,
          showRequest: true,
          kpis: buildKpis(metaTurno, tempoMin, remainingOP, capacity, baseDT, 0)
        };
      }

      let remainingMin = producible * tempoMin;
      let endDT = new Date(baseDT);
      let win = getShiftWindowFor(baseDT);
      while (remainingMin > 0) {
        const start = endDT > win.startDT ? endDT : win.startDT;
        const available = Math.max(0, (win.endDT - start) / 60000);
        const use = Math.min(remainingMin, available);
        endDT = new Date(start.getTime() + use * 60000);
        remainingMin -= use;
        if (remainingMin <= 0) break;
        win = nextShiftWindow(win.endDT, win.id);
      }

      const restMin = Math.max(0, Math.floor((endDT - baseDT) / 60000));
      const restHours = restMin / 60;
      const reason = producible < remainingOP ? "mp" : "meta";
      let status = "ok";
      let statusText = "OK";
      let badgeClass = "ok";
      let noticeClass = "ok";
      let noticeTitle = "Nao encerra dentro da janela critica.";
      if (restHours <= 8) {
        status = "now";
        statusText = "Neste turno";
        badgeClass = "bad";
        noticeClass = "bad";
        noticeTitle = "Vai encerrar neste turno.";
      } else if (restHours <= 16) {
        status = "next";
        statusText = "Proximo turno";
        badgeClass = "warn";
        noticeClass = "warn";
        noticeTitle = "Vai encerrar no proximo turno.";
      }

      return {
        valid: true,
        produced,
        perBar,
        capacity,
        remainingOP,
        producible,
        metaTurno,
        status,
        statusText,
        badgeClass,
        noticeClass,
        noticeTitle,
        reason,
        endDT,
        restMin,
        showRequest: restMin <= (parseInteger(state.settings.requestLimit) || 16) * 60,
        kpis: buildKpis(metaTurno, tempoMin, remainingOP, capacity, endDT, restMin)
      };
    }

    function baseKpis() {
      return [
        ["-", "Producao/turno"],
        ["-", "Tempo por peca"],
        ["-", "Restantes da OP"],
        ["-", "Capacidade com MP"],
        ["-", "Encerramento previsto"],
        ["-", "Horas restantes"]
      ];
    }

    function buildKpis(metaTurno, tempoMin, remainingOP, capacity, endDT, restMin) {
      return [
        [`${metaTurno || 0} pecas`, "Producao/turno"],
        [formatCycle(tempoMin), "Tempo por peca"],
        [`${remainingOP} pecas`, "Restantes da OP"],
        [`${capacity} pecas`, "Capacidade com MP"],
        [endDT ? `${fmtDate(endDT)} ${fmtTime(endDT)} ${shiftName(getShiftWindowFor(endDT).id)}` : "-", "Encerramento previsto"],
        [formatMinutes(restMin), "Horas restantes"]
      ];
    }

    function render() {
      el.baseDate.value = state.base.date;
      el.baseTime.value = state.base.time;
      el.baseShift.textContent = shiftName(getShiftWindowFor(getBaseDateTime()).id);
      el.cards.innerHTML = "";
      el.empty.classList.toggle("visible", state.machines.length === 0);
      state.machines.forEach(machine => el.cards.appendChild(renderCard(machine)));
      saveState();
    }

    function renderCard(machine) {
      const template = document.querySelector("#cardTemplate");
      const node = template.content.firstElementChild.cloneNode(true);
      node.dataset.id = machine.id;
      node.classList.toggle("collapsed", !!machine.collapsed);
      const calc = calcMachine(machine);

      node.querySelector('[data-role="titleMachine"]').textContent = machine.machine || "-";
      const badge = node.querySelector('[data-role="statusBadge"]');
      badge.textContent = calc.statusText;
      badge.className = `badge ${calc.badgeClass || ""}`.trim();
      const mini = node.querySelector('[data-role="miniInfo"]');
      mini.textContent = calc.valid && calc.endDT ? `${formatMinutes(calc.restMin)} / ${fmtTime(calc.endDT)}` : "-";
      mini.className = `badge ${calc.badgeClass || ""}`.trim();

      bindField(node, machine, "machine");
      bindField(node, machine, "timeInput");
      bindField(node, machine, "pieceLength");
      bindField(node, machine, "fullBars");
      bindField(node, machine, "partialMm");
      bindField(node, machine, "partialPieces");
      bindField(node, machine, "target");
      bindField(node, machine, "presetType");
      bindField(node, machine, "requestTime");
      bindField(node, machine, "itemCode");

      renderRadios(node.querySelector('[data-role="barMode"]'), machine, "barMode", [
        ["full", "Cheia"],
        ["partialMm", "Parcial (mm)"],
        ["pieces", "Pecas"]
      ]);
      node.querySelector('[data-role="partialMmWrap"]').style.display = machine.barMode === "partialMm" ? "block" : "none";
      node.querySelector('[data-role="partialPiecesWrap"]').style.display = machine.barMode === "pieces" ? "block" : "none";
      node.querySelector('[data-role="mpPreview"]').textContent =
        `Producao possivel com esta MP: ${calc.capacity} ${plural(calc.capacity, "peca", "pecas")} | ${calc.perBar} por barra`;

      renderTrays(node, machine, calc);
      node.querySelector('[data-role="producedOutput"]').value = `${calc.produced} pecas`;
      renderKpis(node, calc.kpis);
      renderNotice(node, machine, calc);
      renderRequest(node, machine, calc);
      bindActions(node, machine);
      return node;
    }

    function bindField(root, machine, field) {
      const input = root.querySelector(`[data-field="${field}"]`);
      if (!input) return;
      input.value = machine[field] ?? "";
      input.addEventListener("input", () => {
        machine[field] = input.value;
        saveState();
      });
      input.addEventListener("change", () => {
        machine[field] = input.value;
        render();
      });
    }

    function renderRadios(root, machine, field, options) {
      root.innerHTML = "";
      options.forEach(([value, label]) => {
        const item = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = `${field}-${machine.id}`;
        input.value = value;
        input.checked = machine[field] === value;
        input.addEventListener("change", () => {
          machine[field] = value;
          render();
        });
        item.append(input, document.createTextNode(label));
        root.appendChild(item);
      });
    }

    function renderTrays(root, machine, calc) {
      const section = root.querySelector('[data-role="traysSection"]');
      const list = root.querySelector('[data-role="trayList"]');
      const total = root.querySelector('[data-role="trayTotal"]');
      const lockBtn = root.querySelector('[data-action="lockTrays"]');
      const toggleBtn = root.querySelector('[data-action="toggleTrays"]');
      section.classList.toggle("collapsedSection", !!machine.traysCollapsed);
      toggleBtn.textContent = machine.traysCollapsed ? "Abrir" : "Minimizar";
      list.innerHTML = "";
      total.textContent = `Total: ${calc.produced} ${plural(calc.produced, "peca", "pecas")}`;
      lockBtn.textContent = machine.traysLocked ? "Editar gabaritos" : "Concluir gabaritos";
      machine.trays.forEach((value, index) => {
        const row = document.createElement("div");
        row.className = "trayRow";
        const input = document.createElement("input");
        input.className = "input";
        input.type = "number";
        input.min = "0";
        input.step = "1";
        input.placeholder = "Qtd neste gabarito";
        input.value = value;
        input.readOnly = machine.traysLocked;
        input.addEventListener("input", () => {
          machine.trays[index] = input.value;
          saveState();
          total.textContent = `Total: ${machine.trays.reduce((sum, item) => sum + parseInteger(item), 0)} pecas`;
        });
        input.addEventListener("change", () => {
          machine.trays[index] = input.value;
          render();
        });
        const del = document.createElement("button");
        del.className = "iconBtn";
        del.type = "button";
        del.textContent = "×";
        del.disabled = machine.traysLocked;
        del.addEventListener("click", () => {
          machine.trays.splice(index, 1);
          if (!machine.trays.length) machine.trays.push("");
          render();
        });
        row.append(input, del);
        list.appendChild(row);
      });
    }

    function renderKpis(root, kpis) {
      const wrap = root.querySelector('[data-role="kpis"]');
      wrap.innerHTML = "";
      kpis.forEach(([value, label]) => {
        const kpi = document.createElement("div");
        kpi.className = "kpi";
        kpi.innerHTML = `<strong>${value}</strong><span>${label}</span>`;
        wrap.appendChild(kpi);
      });
    }

    function renderNotice(root, machine, calc) {
      const notice = root.querySelector('[data-role="notice"]');
      notice.className = `notice ${calc.noticeClass || ""}`.trim();
      if (!calc.valid) {
        notice.textContent = calc.noticeTitle;
        return;
      }
      const reason = calc.reason === "mp" ? "falta de materia-prima" : "quantidade da OP atingida";
      notice.innerHTML = `
        <strong>${calc.noticeTitle}</strong>
        <small>Tempo ate encerrar: ${formatMinutes(calc.restMin)}. Previsao: ${fmtDate(calc.endDT)} as ${fmtTime(calc.endDT)} (${shiftName(getShiftWindowFor(calc.endDT).id)}).</small>
        <small>Motivo previsto: ${reason}. Produzidas: ${calc.produced}. Restantes da OP: ${calc.remainingOP}. Capacidade com MP: ${calc.capacity}.</small>
      `;
    }

    function renderRequest(root, machine, calc) {
      const box = root.querySelector('[data-role="requestBox"]');
      box.classList.toggle("visible", !!calc.showRequest);
      renderRadios(root.querySelector('[data-role="presetMode"]'), machine, "presetMode", [
        ["yes", "Preset ja trouxe"],
        ["no", "Nao trouxe"]
      ]);
      root.querySelector('[data-role="presetYesWrap"]').style.display = machine.presetMode === "yes" ? "grid" : "none";
      root.querySelector('[data-role="presetNoWrap"]').style.display = machine.presetMode === "no" ? "grid" : "none";
    }

    function bindActions(root, machine) {
      root.querySelector('[data-action="toggle"]').addEventListener("click", () => {
        machine.collapsed = !machine.collapsed;
        render();
      });
      root.querySelector('[data-action="remove"]').addEventListener("click", () => {
        if (!confirm("Remover esta maquina?")) return;
        state.machines = state.machines.filter(item => item.id !== machine.id);
        render();
      });
      root.querySelector('[data-action="minusBar"]').addEventListener("click", () => {
        machine.fullBars = Math.max(0, parseInteger(machine.fullBars) - 1);
        render();
      });
      root.querySelector('[data-action="plusBar"]').addEventListener("click", () => {
        machine.fullBars = parseInteger(machine.fullBars) + 1;
        render();
      });
      root.querySelector('[data-action="toggleTrays"]').addEventListener("click", () => {
        machine.traysCollapsed = !machine.traysCollapsed;
        render();
      });
      root.querySelector('[data-action="addTray"]').addEventListener("click", () => {
        if (machine.traysLocked) return;
        machine.traysCollapsed = false;
        machine.trays.push("");
        render();
      });
      root.querySelector('[data-action="lockTrays"]').addEventListener("click", () => {
        machine.traysLocked = !machine.traysLocked;
        render();
      });
    }

    function openSettings() {
      el.barLength.value = state.settings.barLength;
      el.kerfWidth.value = state.settings.kerfWidth;
      el.requestLimit.value = state.settings.requestLimit;
      el.turnMinutes.value = state.settings.turnMinutes;
      el.modal.showModal();
    }

    function saveSettings() {
      state.settings.barLength = Math.max(1, parseNumber(el.barLength.value) || DEFAULT_SETTINGS.barLength);
      state.settings.kerfWidth = Math.max(0, parseNumber(el.kerfWidth.value) || 0);
      state.settings.requestLimit = Math.max(1, parseInteger(el.requestLimit.value) || DEFAULT_SETTINGS.requestLimit);
      state.settings.turnMinutes = Math.max(1, parseInteger(el.turnMinutes.value) || DEFAULT_SETTINGS.turnMinutes);
      el.modal.close();
      render();
    }

    function presetLabel(machine) {
      const map = {
        sequencia: "Sequencia",
        azul: "Setup Azul",
        verde: "Setup Verde",
        vermelho: "Setup Vermelho"
      };
      return map[machine.presetType] || "Sequencia";
    }

    function buildWhatsAppReport() {
      const baseDT = getBaseDateTime();
      const lines = [];
      lines.push("*RELATORIO EXPERTCNC - INICIO DO TURNO*");
      lines.push(`Base: ${fmtDate(baseDT)} as ${fmtTime(baseDT)} - ${shiftName(getShiftWindowFor(baseDT).id)}`);
      lines.push(`Barra: ${state.settings.barLength} mm | Bedame: ${state.settings.kerfWidth} mm`);
      lines.push("");

      const validMachines = state.machines
        .map(machine => ({ machine, calc: calcMachine(machine) }))
        .filter(item => item.calc.valid);

      if (!validMachines.length) {
        lines.push("Nenhuma maquina com dados completos para calcular.");
      }

      validMachines.forEach(({ machine, calc }, index) => {
        const name = machine.machine || "-";
        const status =
          calc.status === "now" ? "ENCERRA NESTE TURNO" :
          calc.status === "next" ? "ENCERRA NO PROXIMO TURNO" :
          calc.status === "done" ? "OP FINALIZADA" :
          "OK";
        const reason = calc.reason === "mp" ? "Falta de materia-prima" : "Meta/quantidade da OP";
        lines.push(`*TNL ${name}* - ${status}`);
        lines.push(`Tempo ate encerrar: ${formatMinutes(calc.restMin)}`);
        lines.push(`Previsao: ${fmtDate(calc.endDT)} as ${fmtTime(calc.endDT)} (${shiftName(getShiftWindowFor(calc.endDT).id)})`);
        lines.push(`Motivo: ${reason}`);
        lines.push(`Meta OP: ${parseInteger(machine.target)} pecas`);
        lines.push(`Produzidas: ${calc.produced} pecas`);
        lines.push(`Restantes: ${calc.remainingOP} pecas`);
        lines.push(`Meta do turno: ${calc.metaTurno} pecas`);
        lines.push(`Tempo da peca: ${formatCycle(parseTempoToMinutes(machine.timeInput))}`);
        lines.push(`MP: ${calc.capacity} pecas disponiveis (${calc.perBar} por barra)`);

        if (calc.showRequest && calc.status !== "ok" && calc.status !== "done") {
          if (machine.presetMode === "yes") {
            lines.push(`Preset: SIM - ${presetLabel(machine)} previsto para ${fmtTime(calc.endDT)}`);
          } else {
            lines.push(`Preset: NAO`);
            lines.push(`Solicitar: ${machine.requestTime || fmtTime(calc.endDT)}`);
            lines.push(`Item: ${machine.itemCode || "-"}`);
          }
        } else {
          lines.push("Proxima OP: sem solicitacao critica no momento.");
        }

        if (index < validMachines.length - 1) lines.push("------------------------------");
      });

      lines.push("");
      lines.push(`Gerado as ${fmtTime(new Date())} pelo EXPERTCNC.`);
      return lines.join("\n");
    }

    function sendWhatsApp() {
      render();
      const text = buildWhatsAppReport();
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    }

    document.querySelector("#addMachineBtn").addEventListener("click", () => {
      state.machines.push(DEFAULT_MACHINE());
      render();
    });
    document.querySelector("#calcAllBtn").addEventListener("click", render);
    document.querySelector("#settingsBtn").addEventListener("click", openSettings);
    document.querySelector("#saveSettingsBtn").addEventListener("click", saveSettings);
    document.querySelector("#whatsBtn").addEventListener("click", sendWhatsApp);
    el.baseDate.addEventListener("input", () => {
      state.base.date = el.baseDate.value;
      saveState();
    });
    el.baseDate.addEventListener("change", () => {
      state.base.date = el.baseDate.value;
      render();
    });
    el.baseTime.addEventListener("input", () => {
      state.base.time = el.baseTime.value;
      saveState();
    });
    el.baseTime.addEventListener("change", () => {
      state.base.time = el.baseTime.value;
      render();
    });

    render();
  </script>
</body>
</html>
